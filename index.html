<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Jiwa Militer</title><link rel="stylesheet" href="style.css"></head>
<body>
<div id="loginPage" class="center">
<div class="card"><h2>JIWA MILITER</h2>
<input id="u" placeholder="Username"><input id="p" type="password" placeholder="Password">
<button onclick="login()">Login</button></div></div>

<div id="app" style="display:none">
<div class="sidebar">
<h2>JIWA MILITER</h2>
<button onclick="show('dashboard')">Dashboard</button>
<button onclick="show('produk')">Produk</button>
<button onclick="show('laporan')">Laporan</button>
<button onclick="show('admin')">Administrasi</button>
<button onclick="logout()">Logout</button>
</div>
<div class="main">
<div id="dashboard" class="page"><h1>Dashboard</h1><div class="stats">
<div class="box">Produk: <span id="jmlProduk">0</span></div>
</div></div>

<div id="produk" class="page hidden">
<h1>Data Produk</h1>
<input id="nama" placeholder="Nama Produk">
<input id="harga" placeholder="Harga">
<button onclick="addProduk()">Simpan</button>
<table><thead><tr><th>Nama</th><th>Harga</th><th>Aksi</th></tr></thead><tbody id="tb"></tbody></table>
</div>

<div id="laporan" class="page hidden">
<h1>Laporan</h1><button onclick="window.print()">Cetak</button>
</div>

<div id="admin" class="page hidden">
<h1>Administrasi</h1><button onclick="alert('Manajemen User')">Manajemen User</button>
</div>
</div></div>
<script src="app.js"></script></body></html>
